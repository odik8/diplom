services:
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: meal_delivery
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  migrate:
    build: ./backend
    environment:
      DATABASE_URL: postgresql://postgres:password@db:5432/meal_delivery
      JWT_SECRET: super_secret_jwt_key_diplom_2026
      JWT_EXPIRES_IN: 7d
      NODE_ENV: development
    depends_on:
      db:
        condition: service_healthy
    command: npm run setup
    restart: "no"

  backend:
    build: ./backend
    restart: unless-stopped
    environment:
      PORT: 5001
      DATABASE_URL: postgresql://postgres:password@db:5432/meal_delivery
      JWT_SECRET: super_secret_jwt_key_diplom_2026
      JWT_EXPIRES_IN: 7d
      NODE_ENV: development
      # PayPalych: тестовый режим эмулирует оплату локально.
      # Для боевого режима укажите PAYPALYCH_TOKEN и PAYPALYCH_SHOP_ID
      # из кабинета https://paypalych.com и уберите PAYPALYCH_TEST_MODE.
      PAYPALYCH_TEST_MODE: "true"
      # PAYPALYCH_TOKEN: ""
      # PAYPALYCH_SHOP_ID: ""
    ports:
      - "5001:5001"
    depends_on:
      migrate:
        condition: service_completed_successfully

  admin:
    build: ./admin
    restart: unless-stopped
    environment:
      BACKEND_URL: http://backend:5001
    ports:
      - "3000:3000"
    depends_on:
      - backend


volumes:
  db_data:
